vacancyPromptTemplateBrowse.caption=Vacancy prompt templates
vacancyPromptTemplateEdit.caption=Vacancy prompt template

VacancyPromptTemplate.code.description=Unique technical template code in uppercase. Used in backend code (e.g. STANDARDIZE_VACANCY).
VacancyPromptTemplate.temperature.description=AI creativity and randomness level (from 0.0 to 1.0).\n\n\
  \u2022 0.0\u20130.3: Highly accurate and factual. Perfect for data extraction and job description standardization.\n\
  \u2022 0.4\u20130.7: Balanced approach (default 0.7). Suitable for generating interview checklists and plans.\n\
  \u2022 0.8\u20131.0: High creativity. Good for generating engaging promotional hiring posts.

templateName.caption=Template name
templateNameDescription=Choose a clear name for this template (e.g. "IT resume review"). It helps you find it quickly in the list among other templates.

aiRole.caption=AI role
aiRoleDescription=Who should the AI pretend to be? For example: Experienced recruiter, Programmer, or Psychologist. The role guides the AI to use the right professional language and tone.

mainTask.caption=Main task
mainTaskDescription=Describe in detail what the computer should do. The more specific the task (e.g. "Extract three main skills from this text"), the more accurate the result.

constraintsDescription=Write here what the AI must absolutely NOT do. For example: "Do not use complex terms" or "The answer must be strictly no longer than 5 sentences".

outputFormatDescription=Choose the format you want for the response: plain text, a clear table, or a bullet list.

exampleDescription=Show the computer an example of the result you consider ideal. The AI will analyze the structure of your sample and produce its answer in the same style.
