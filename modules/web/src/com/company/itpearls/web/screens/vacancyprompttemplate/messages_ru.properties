vacancyPromptTemplateBrowse.caption=Шаблоны промптов вакансий
vacancyPromptTemplateEdit.caption=Шаблон промпта вакансии

VacancyPromptTemplate.code.description=Уникальный технический код шаблона большими буквами. Используется в коде бэкенда (например: STANDARDIZE_VACANCY).
VacancyPromptTemplate.temperature.description=Уровень креативности и случайности ИИ (от 0.0 до 1.0).\n\n\
  \u2022 0.0\u20130.3: Высокая точность и фактичность. Идеально для извлечения данных и стандартизации описаний вакансий.\n\
  \u2022 0.4\u20130.7: Сбалансированный подход (по умолчанию 0.7). Подходит для составления чек-листов и планов интервью.\n\
  \u2022 0.8\u20131.0: Высокая креативность. Хорошо подходит для генерации увлекательных промо-постов о найме.

templateName.caption=Название шаблона
templateNameDescription=Придумайте понятное имя для этого шаблона (например, "Проверка резюме IT-специалиста"). Это поможет быстро найти его в списке среди других заготовок.

aiRole.caption=Роль ИИ
aiRoleDescription=Кем должен притвориться искусственный интеллект? Например: Опытный рекрутер, Программист или Психолог. Выбор роли заставляет ИИ использовать правильный профессиональный язык и тональность.

mainTask.caption=Основная задача
mainTaskDescription=Подробно опишите, что именно должен сделать компьютер. Чем конкретнее задача (например: "Выдели из этого текста три главных навыка кандидата"), тем точнее результат.

constraintsDescription=Напишите здесь, чего искусственному интеллекту делать категорически НЕЛЬЗЯ. Например: "Не используй сложные термины" или "Ответ должен быть строго не длиннее 5 предложений".

outputFormatDescription=Выберите, в каком виде вы хотите получить готовый ответ: в виде обычного текста, наглядной таблицы или списка по пунктам.

exampleDescription=Покажите компьютеру пример того, какой результат вы считаете идеальным. ИИ проанализирует структуру вашего образца и сделает свой ответ точно в таком же стиле.
